    <text x="276" y="394" class="cn" font-size="13" font-weight="500" fill="#E7EEF3" >2024 年中国新能源汽车市场呈现出高增长、结构优化和政策持续驱动的特点。</text>
    <text x="276" y="432" class="cn" font-size="13" font-weight="500" fill="#E7EEF3" >1. 市场规模持续增长：预计销量达到 1,280 万辆，同比约增长 35%。</text>
    <text x="276" y="470" class="cn" font-size="13" font-weight="500" fill="#E7EEF3" >2. 结构优化：纯电与插混双线提升，中高端车型销量占比扩大。</text>
    <text x="276" y="508" class="cn" font-size="13" font-weight="500" fill="#E7EEF3" >3. 政策影响：以旧换新补贴、地方购车优惠和充电设施建设推动需求释放。</text>
    <text x="276" y="546" class="cn" font-size="13" font-weight="500" fill="#E7EEF3" >4. 技术与产业链：电池效率、智能配置与供应链协同继续强化。</text>
    <text x="276" y="608" class="cn" font-size="13" font-weight="900" fill="#E7EEF3" >引用来源</text>
